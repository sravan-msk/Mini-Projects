<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
        }

        header {
            background-color: lightcyan;
        }

        .container {
            max-width: 1200px;
            margin-inline: auto;
            padding: 20px;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 25px;
            font-weight: 700;
        }

        .list {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .list li a {
            text-decoration: none;
            font-size: 16px;
            color: black;
            transition: all 1s ease;
        }

        .list li a:hover {
            color: rgb(255, 0, 0);
            font-weight: 500;
        }
    </style>
</head>

<body>
    <header>
        <div class="container nav-container">
            <div class="logo">Logo</div>
            <nav>
                <ul class="list">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Service</a></li>
                    <li><a href="#">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>
</body>

</html>
