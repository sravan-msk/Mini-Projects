<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h2>Password Generator</h2>
        <div class="display-container">
            <input type="text" id="display" readonly>
        </div>
        <div class="note"></div>
        <div class="check-container">
            <label for="number">
                <input type="checkbox" name="" id="number">
                <span>Contains numbers.</span>
            </label>
            <label for="lowercase">
                <input type="checkbox" name="" id="lowercase">
                <span>Contains lowercase letters.</span>
            </label>
            <label for="uppercase">
                <input type="checkbox" name="" id="uppercase">
                <span>Contains uppercase letters.</span>
            </label>
            <label for="symbols">
                <input type="checkbox" name="" id="symbols">
                <span>Contains specail symbols.</span>
            </label>
        </div>
        <button id="btn">Generate password</button>
    </div>
   

    <script src="script.js"></script>
</body>

</html>
