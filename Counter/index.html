<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            background-color: antiquewhite;
        }

        .container {
            height: 250px;
            width: 500px;
            border: 1px solid black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            border-radius: 12px;
        }

        h2 {
            font-size: 32px;
        }

        button {
            font-weight: 700;
            font-size: large;
            width: 100px;
            padding: 5px 10px;
            border: none;
            border-radius: 6px;
            margin-left: 30px;
            background-color: #394956;
            color: white;
            cursor: pointer;
            transition: all 1s ease;
        }

        button:hover {
            background-color: #394956e9;
        }

        button:active {
            background-color: #33414db8;
        }

        @media(max-width:425px) {
            .container {
                width: 100vw;
                height: 40vh;
                border-radius: none;
                gap: 50px;
                border: none;
            }

            button {
                margin-left: 10px;
            }
        }
    </style>
</head>

<body>
    <h2>Counter</h2>
    <div class="container">
        <h2 id="display">0</h2>
        <div class="btns-container">
            <button onclick="increament()">+</button>
            <button onclick="decreament()">-</button>
            <button onclick="reset()">reset</button>
        </div>
    </div>
    <script>
        let display = document.getElementById("display");
        display.value = 0;

        function increament() {
            display.value += 1;
            display.textContent = display.value;
        }
        function decreament() {
            if (display.value <= 0) return;
            display.value -= 1;
            display.textContent = display.value;
        }
        function reset() {
            display.value = 0;
            display.textContent = display.value;
        }
    </script>
</body>

</html>
